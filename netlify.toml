# Netlify build configuration for LinuxLab UFPS (Next.js 16, App Router)
# The @netlify/plugin-nextjs runtime turns the Next build into serverless
# functions + static assets. It is declared explicitly below so it always
# runs (auto-detection can be skipped when a custom build command is set).

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Next 16 needs a modern Node runtime for its serverless functions.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
